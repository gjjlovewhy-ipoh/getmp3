name: MP3网盘定时抓取

# 每小时执行一次
on:
  schedule:
    - cron: '0 * * * *'
  # 支持手动点击运行
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行抓取脚本
        run: python mp3_crawler.py

      - name: 提交更新的txt文件
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mp3_links.txt
          git commit -m "自动更新MP3链接列表 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
