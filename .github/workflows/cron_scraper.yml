name: MP3网盘定时抓取
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      - name: Run crawler
        run: python mp3_crawler.py

      - name: Commit & Push
        run: |
          git config user.name "Actions Bot"
          git config user.email "bot@github.com"
          git add mp3_links.txt
          git commit -m "Auto update mp3 links" || echo "No changes to commit"
          git push
