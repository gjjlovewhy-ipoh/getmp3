name: Hourly MP3 Scraper

on:
  schedule:
    # 使用 cron 表达式，这里表示每小时的第 0 分钟运行一次 (UTC时间)
    - cron: '0 * * * *'
  # 允许手动点击按钮触发运行
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行爬虫脚本
      run: python scraper.py

    - name: 提交并推送结果到仓库
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add mp3_links.txt
        git commit -m "自动更新: $(date '+%Y-%m-%d %H:%M:%S') 抓取结果" || echo "没有新的更改需要提交"
        git push
